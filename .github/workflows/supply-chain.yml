name: Backend Supply Chain

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  composer-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Composer audit (locked)
        run: composer audit --locked --no-interaction

  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Allow CycloneDX Composer plugin
        run: composer global config --no-plugins allow-plugins.cyclonedx/cyclonedx-php-composer true

      - name: Install CycloneDX Composer plugin
        run: composer global require cyclonedx/cyclonedx-php-composer:^6.2 --no-interaction --no-progress

      - name: Generate runtime SBOM
        run: |
          mkdir -p build
          composer CycloneDX:make-sbom \
            --output-format=JSON \
            --output-file=build/backend-sbom.cyclonedx.json \
            --omit=dev \
            --omit=plugin \
            --output-reproducible \
            --validate

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-sbom-cyclonedx
          path: build/backend-sbom.cyclonedx.json
          if-no-files-found: error

  container-scan:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build runtime image for scanning
        run: docker build --target app -t obsidian-admin-laravel:scan .

      - name: Prepare scan output directory
        run: |
          mkdir -p build
          printf '{"version":"2.1.0","runs":[]}\n' > build/container-scan-trivy.sarif
          printf 'Trivy critical scan did not produce output.\n' > build/container-scan-critical.txt

      - name: Install Trivy CLI
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh             | sh -s -- -b /usr/local/bin
          trivy --version

      - name: Generate SARIF report for runtime image
        id: sarif_scan
        continue-on-error: true
        run: |
          trivy image \
            --format sarif \
            --output build/container-scan-trivy.sarif \
            --severity HIGH,CRITICAL \
            --vuln-type os,library \
            --ignore-unfixed \
            --scanners vuln \
            obsidian-admin-laravel:scan

      - name: Upload SARIF to GitHub code scanning
        if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) && steps.sarif_scan.outcome == 'success'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/container-scan-trivy.sarif
          category: backend-runtime-image

      - name: Critical vulnerability gate
        id: critical_scan
        continue-on-error: true
        run: |
          trivy image \
            --format table \
            --output build/container-scan-critical.txt \
            --severity CRITICAL \
            --vuln-type os,library \
            --ignore-unfixed \
            --scanners vuln \
            --exit-code 1 \
            obsidian-admin-laravel:scan

      - name: Upload runtime image scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-runtime-image-scan
          path: |
            build/container-scan-trivy.sarif
            build/container-scan-critical.txt
          if-no-files-found: error

      - name: Fail if SARIF scan could not run
        if: steps.sarif_scan.outcome == 'failure'
        run: |
          cat build/container-scan-critical.txt || true
          exit 1

      - name: Fail if critical vulnerabilities were found
        if: steps.critical_scan.outcome == 'failure'
        run: |
          cat build/container-scan-critical.txt || true
          exit 1

  attest-sbom:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: sbom
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-sbom-cyclonedx
          path: build

      - name: Attest SBOM artifact
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: build/backend-sbom.cyclonedx.json

  attest-source:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build source bundle
        run: |
          tar -czf backend-source.tgz \
            app bootstrap config database routes \
            artisan composer.json composer.lock

      - name: Attest backend source bundle
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: backend-source.tgz
