name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare release notes
        run: |
          VERSION_TAG="${GITHUB_REF_NAME}"
          VERSION="${VERSION_TAG#v}"
          RELEASE_NOTE_PATH="docs/releases/${VERSION_TAG}.md"

          if [ -f "${RELEASE_NOTE_PATH}" ]; then
            cp "${RELEASE_NOTE_PATH}" RELEASE_NOTES.md
            exit 0
          fi

          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {capture=1; print; next}
            capture && $0 ~ "^## \\[" {exit}
            capture {print}
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            {
              echo "## ${GITHUB_REF_NAME}"
              echo
              echo "Release notes fallback. See CHANGELOG.md for details, or add ${RELEASE_NOTE_PATH}."
            } > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          append_body: false
          generate_release_notes: false
          make_latest: true

  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref_name, 'v0.') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=obsidian-admin-laravel
            org.opencontainers.image.description=Production-ready Laravel 12 admin backend with domain-driven boundaries, multi-tenancy, audit logs, and official Octane integration.
            org.opencontainers.image.vendor=Obsidian Labs
            org.opencontainers.image.licenses=MIT

      - name: Build and push GHCR image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

      - name: Attest GHCR image
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
