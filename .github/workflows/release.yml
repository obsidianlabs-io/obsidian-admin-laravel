name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release pairing
        run: php scripts/check-release-pairing.php "${GITHUB_REF_NAME}"

      - name: Prepare release notes
        run: |
          VERSION_TAG="${GITHUB_REF_NAME}"
          VERSION="${VERSION_TAG#v}"
          RELEASE_NOTE_PATH="docs/releases/${VERSION_TAG}.md"

          if [ -f "${RELEASE_NOTE_PATH}" ]; then
            cp "${RELEASE_NOTE_PATH}" RELEASE_NOTES.md
            exit 0
          fi

          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {capture=1; print; next}
            capture && $0 ~ "^## \\[" {exit}
            capture {print}
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            {
              echo "## ${GITHUB_REF_NAME}"
              echo
              echo "Release notes fallback. See CHANGELOG.md for details, or add ${RELEASE_NOTE_PATH}."
            } > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          append_body: false
          generate_release_notes: false
          make_latest: true

  publish-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref_name, 'v0.') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=obsidian-admin-laravel
            org.opencontainers.image.description=Production-ready Laravel 12 admin backend with domain-driven boundaries, multi-tenancy, audit logs, and official Octane integration.
            org.opencontainers.image.vendor=Obsidian Labs
            org.opencontainers.image.licenses=MIT

      - name: Build and push GHCR image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

      - name: Attest GHCR image
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  verify-published-image:
    needs: publish-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      RELEASE_IMAGE_TAG: ${{ github.ref_name }}
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for published image tag
        run: |
          VERSION_TAG="${RELEASE_IMAGE_TAG#v}"
          IMAGE_REF="${IMAGE_NAME}:${VERSION_TAG}"

          for attempt in $(seq 1 10); do
            if docker manifest inspect "${IMAGE_REF}" >/dev/null 2>&1; then
              exit 0
            fi

            sleep 6
          done

          echo "Published image ${IMAGE_REF} was not available in time."
          exit 1

      - name: Cold boot published image
        run: |
          VERSION_TAG="${RELEASE_IMAGE_TAG#v}"
          IMAGE_REF="${IMAGE_NAME}:${VERSION_TAG}"
          CONTAINER_NAME="obsidian-admin-laravel-release-smoke"

          docker pull "${IMAGE_REF}"

          docker run -d \
            --name "${CONTAINER_NAME}" \
            -e APP_KEY=base64:VdMKqNOj13fIHY8Jaz9UJW6QcgOZsRk8C/2QmyntTnQ= \
            -e APP_ENV=production \
            -e APP_DEBUG=false \
            -e APP_URL=http://127.0.0.1 \
            -e DB_CONNECTION=sqlite \
            -e DB_DATABASE=/tmp/database.sqlite \
            -e CACHE_STORE=array \
            -e SESSION_DRIVER=array \
            -e QUEUE_CONNECTION=sync \
            "${IMAGE_REF}"

          sleep 12
          docker inspect -f '{{.State.Running}}' "${CONTAINER_NAME}" | grep -qx true
          docker exec "${CONTAINER_NAME}" php artisan about --only=environment

      - name: Dump published image diagnostics
        if: failure()
        run: |
          VERSION_TAG="${RELEASE_IMAGE_TAG#v}"
          IMAGE_REF="${IMAGE_NAME}:${VERSION_TAG}"
          CONTAINER_NAME="obsidian-admin-laravel-release-smoke"

          docker images "${IMAGE_REF}" || true
          docker logs "${CONTAINER_NAME}" || true
          docker exec "${CONTAINER_NAME}" php -v || true
          docker exec "${CONTAINER_NAME}" php -m || true
          docker exec "${CONTAINER_NAME}" php artisan about --only=environment || true
          docker exec "${CONTAINER_NAME}" ls -la bootstrap/cache || true
          docker exec "${CONTAINER_NAME}" ls -la storage/logs || true

      - name: Cleanup published image smoke container
        if: always()
        run: docker rm -f obsidian-admin-laravel-release-smoke || true

  scan-published-image:
    needs: verify-published-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      RELEASE_IMAGE_TAG: ${{ github.ref_name }}
      TRIVY_USERNAME: ${{ github.actor }}
      TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare scan output directory
        run: mkdir -p build

      - name: Export release image reference
        run: echo "RELEASE_IMAGE_REF=${IMAGE_NAME}:${RELEASE_IMAGE_TAG#v}" >> "$GITHUB_ENV"

      - name: Generate SARIF report for published image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ env.RELEASE_IMAGE_REF }}
          format: sarif
          output: build/release-image-trivy.sarif
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          scanners: vuln
          exit-code: '0'

      - name: Critical vulnerability gate
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ env.RELEASE_IMAGE_REF }}
          format: table
          output: build/release-image-trivy-critical.txt
          severity: CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          scanners: vuln
          exit-code: '1'

      - name: Upload vulnerability scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-release-image-scan
          path: |
            build/release-image-trivy.sarif
            build/release-image-trivy-critical.txt
          if-no-files-found: error
