name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Framework optimize smoke check
        env:
          CACHE_STORE: array
        run: |
          php artisan optimize
          php artisan optimize:clear

      - name: OpenAPI lint gate
        run: php artisan openapi:lint

      - name: Security baseline gate
        run: php artisan security:baseline

      - name: Proxy trust configuration gate
        run: php artisan http:proxy-trust-check --strict

      - name: API contract snapshot gate
        run: php artisan api:contract-snapshot

      - name: OpenAPI contract route gate
        run: php artisan test tests/Feature/OpenApiContractTest.php --filter=test_openapi_documented_operations_are_registered_for_root_and_v1_api_routes

      - name: Lint (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (Larastan/PHPStan)
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Architecture tests (Pest)
        run: vendor/bin/pest tests/Architecture --colors=always

      - name: Domain boundary gate (Deptrac)
        run: vendor/bin/deptrac --config-file=deptrac.yaml --no-interaction

  tests-sqlite:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare SQLite environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch /tmp/soybean-testing.sqlite
          {
            echo 'DB_CONNECTION=sqlite'
            echo 'DB_DATABASE=/tmp/soybean-testing.sqlite'
          } >> .env

      - name: Fresh migration and seed (SQLite)
        env:
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          AUDIT_QUEUE_CONNECTION: sync
        run: php artisan migrate:fresh --seed --force

      - name: Run tests (SQLite)
        run: php artisan test

  octane-smoke:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Octane environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php vendor/bin/rr get-binary --no-interaction --no-config --location=. --os=linux --arch=amd64

      - name: Start Octane
        env:
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          AUDIT_QUEUE_CONNECTION: sync
        run: |
          php artisan octane:start --server=roadrunner --host=127.0.0.1 --port=8010 --workers=1 --task-workers=1 > storage/logs/octane-smoke.log 2>&1 &
          echo $! > octane.pid

      - name: Health smoke check
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8010/api/health/live | grep -q 'alive'; then
              exit 0
            fi
            sleep 1
          done
          cat storage/logs/octane-smoke.log
          exit 1

      - name: Stop Octane
        if: always()
        run: |
          php artisan octane:stop --server=roadrunner || true
          if [ -f octane.pid ]; then
            kill "$(cat octane.pid)" || true
          fi

  docker-smoke:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Docker environment
        run: |
          cp .env.example .env
          php -r '$key = "base64:".base64_encode(random_bytes(32)); $env = file_get_contents(".env"); $env = preg_replace("/^APP_KEY=.*/m", "APP_KEY=".$key, $env); file_put_contents(".env", $env);'
          {
            echo 'DB_CONNECTION=mysql'
            echo 'DB_HOST=mysql'
            echo 'DB_PORT=3306'
            echo 'DB_DATABASE=obsidian'
            echo 'DB_USERNAME=obsidian'
            echo 'DB_PASSWORD=obsidian'
            echo 'REDIS_HOST=redis'
            echo 'CACHE_STORE=array'
            echo 'SESSION_DRIVER=array'
            echo 'QUEUE_CONNECTION=sync'
            echo 'AUDIT_QUEUE_CONNECTION=sync'
          } >> .env

      - name: Build and start Docker runtime
        env:
          APP_HTTP_PORT: 18080
          REVERB_PUBLIC_PORT: 16001
        run: docker compose -f docker-compose.production.yml up -d --build mysql redis app nginx

      - name: Docker health smoke check
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://127.0.0.1:18080/api/health/live | grep -q 'alive'; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.production.yml logs app nginx mysql redis
          exit 1

      - name: Stop Docker runtime
        if: always()
        run: docker compose -f docker-compose.production.yml down -v

  image-boot-smoke:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build production app image
        run: docker build -t obsidian-admin-laravel:image-smoke .

      - name: Start production app image
        run: |
          docker run -d --name obsidian-admin-laravel-image-smoke \
            -e APP_ENV=production \
            -e APP_DEBUG=false \
            -e LOG_CHANNEL=stderr \
            -e LOG_STACK=stderr \
            obsidian-admin-laravel:image-smoke

      - name: Verify image stays running
        run: |
          sleep 5
          if [ "$(docker inspect -f '{{.State.Running}}' obsidian-admin-laravel-image-smoke)" != "true" ]; then
            docker logs obsidian-admin-laravel-image-smoke
            exit 1
          fi

      - name: Stop production app image
        if: always()
        run: |
          docker rm -f obsidian-admin-laravel-image-smoke || true
          docker image rm obsidian-admin-laravel:image-smoke || true

  tests-mysql:
    runs-on: ubuntu-latest
    needs: quality
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: obsidian_testing
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare MySQL environment
        run: |
          cp .env.example .env
          php artisan key:generate
          {
            echo 'DB_CONNECTION=mysql'
            echo 'DB_HOST=127.0.0.1'
            echo 'DB_PORT=3306'
            echo 'DB_DATABASE=obsidian_testing'
            echo 'DB_USERNAME=root'
            echo 'DB_PASSWORD=root'
          } >> .env

      - name: Fresh migration and seed (MySQL)
        env:
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          AUDIT_QUEUE_CONNECTION: sync
        run: php artisan migrate:fresh --seed --force

      - name: Run tests (MySQL)
        run: vendor/bin/pest --configuration=phpunit.mysql.xml

  tests-pgsql:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: obsidian_testing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d obsidian_testing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: pdo_pgsql

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare PostgreSQL environment
        run: |
          cp .env.example .env
          php artisan key:generate
          {
            echo 'DB_CONNECTION=pgsql'
            echo 'DB_HOST=127.0.0.1'
            echo 'DB_PORT=5432'
            echo 'DB_DATABASE=obsidian_testing'
            echo 'DB_USERNAME=postgres'
            echo 'DB_PASSWORD=postgres'
          } >> .env

      - name: Fresh migration and seed (PostgreSQL)
        env:
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          AUDIT_QUEUE_CONNECTION: sync
        run: php artisan migrate:fresh --seed --force

      - name: Run tests (PostgreSQL)
        run: vendor/bin/pest --configuration=phpunit.pgsql.xml
