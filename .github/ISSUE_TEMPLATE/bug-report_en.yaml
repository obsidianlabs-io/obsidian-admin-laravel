name: "🐞 Bug Report"
description: Report a backend bug, regression, contract issue, or operational problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Before submitting:
        - confirm the issue is reproducible
        - check whether it is already reported
        - do not use this form for security vulnerabilities

        For security issues, use the private reporting path described in `SECURITY.md`.

  - type: input
    id: version
    attributes:
      label: Affected Version
      description: Release tag, branch, or commit hash
      placeholder: v1.2.0 / main / 90379fc
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Auth
        - Access / RBAC
        - Tenant / Multi-tenancy
        - System / Audit / Config
        - OpenAPI / Contract
        - Queue / Horizon / Reverb
        - Octane / RoadRunner
        - CI / Tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include PHP version, database, cache/queue driver, runtime, and deployment mode
      placeholder: |
        PHP 8.2
        Laravel 12
        MySQL 8 / PostgreSQL 15 / SQLite
        Redis queue
        Docker / Native / Octane
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: List the exact steps needed to reproduce the issue
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain the practical impact. Mention tenant leak, auth bypass, contract break, or production risk if relevant.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Trace IDs / Request IDs
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional Context
