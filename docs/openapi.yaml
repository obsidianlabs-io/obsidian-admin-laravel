openapi: 3.0.3
info:
  title: Obsidian Admin Laravel API
  version: 1.2.0
  description: |
    Obsidian Admin Laravel API contract.
    All endpoints return a wrapper payload: `code`, `msg`, `data`, `requestId`, `traceId`.
    See error code catalog in `docs/api-error-catalog.md`.
servers:
  - url: http://localhost:9527/proxy-default/v1
    description: Canonical versioned API
  - url: http://localhost:9527/proxy-default
    description: Legacy unversioned compatibility (can be disabled)
x-error-catalog:
  '0000': Success
  '1001': Login/credential validation failed
  '1002': Parameter or validation error
  '1003': Forbidden (permission denied)
  '1009': Optimistic lock conflict
  '4050': Method not allowed
  '4040': Resource or route not found
  '4290': Too many requests (throttled)
  '5000': Server error
  '8888': Unauthorized
  '9999': Token expired
paths:
  /system/feature-flags:
    get:
      tags: [System]
      summary: List feature flags
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: feature
          schema: { type: string }
        - in: query
          name: tenantId
          schema: { type: integer }
        - in: query
          name: roleCode
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [active, inactive] }
      responses:
        "200":
          description: Feature flag list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureFlagListResponse"
  /system/feature-flags/toggle:
    put:
      tags: [System]
      summary: Toggle feature flag override
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeatureFlagToggleRequestBody"
      responses:
        "200":
          description: Feature flag override updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureFlagOverrideResponse"
  /system/feature-flags/purge:
