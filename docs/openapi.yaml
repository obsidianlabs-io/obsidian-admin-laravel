components:
  parameters:
    TenantHeader:
      in: header
      name: X-Tenant-Id
      schema:
        type: string
      required: false
      description: Optional tenant override for super-admin scope.
    IdPath:
      in: path
      name: id
      required: true
      schema:
        type: integer
        minimum: 1
    SessionIdPath:
      in: path
      name: sessionId
      required: true
      schema:
        type: string
        maxLength: 128
  schemas:
    ApiResponse:
      type: object
      required:
        - code
        - msg
        - data
      properties:
        code:
          type: string
          description: Business status code. See x-error-catalog and docs/api-error-catalog.md.
        msg:
          type: string
        data:
          type: object
          additionalProperties: true
        requestId:
          type: string
          nullable: true
        traceId:
          type: string
          nullable: true
    ApiErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
      example:
        code: '1003'
        msg: Forbidden
        data: {}
        requestId: 177f2e17-c4ad-4976-b681-fd3230884f15
        traceId: 44ad0b87d4a14bf19f9be41ce53bff7a
    EnableStatus:
      type: string
      enum: ['1', '2']
    LoginRequestBody:
      type: object
      required:
        - userName
        - password
        - rememberMe
      properties:
        userName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        rememberMe:
          type: boolean
        otpCode:
          type: string
        locale:
          type: string
    RegisterRequestBody:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
    ForgotPasswordRequestBody:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequestBody:
      type: object
      required:
        - token
        - email
        - password
        - password_confirmation
      properties:
        token:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        password_confirmation:
          type: string
    RefreshTokenRequestBody:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    LogoutRequestBody:
      type: object
      properties:
        refreshToken:
          type: string
    UpdateSessionAliasRequestBody:
      type: object
      properties:
        deviceAlias:
          type: string
          maxLength: 80
    UpdatePreferredLocaleRequestBody:
      type: object
      required:
        - locale
      properties:
        locale:
          type: string
        preferredLocale:
          type: string
          deprecated: true
    UpdateUserPreferencesRequestBody:
      type: object
      properties:
        themeSchema:
          type: string
          enum: [light, dark, auto]
        timezone:
          type: string
          maxLength: 64
      additionalProperties: false
    UpdateProfileRequestBody:
      type: object
      required:
        - userName
        - email
      properties:
        userName:
          type: string
        email:
          type: string
          format: email
        currentPassword:
          type: string
        password:
          type: string
        password_confirmation:
          type: string
        timezone:
          type: string
        version:
          type: integer
          minimum: 1
        updatedAt:
          type: string
        updateTime:
          type: string
    TwoFactorCodeRequestBody:
      type: object
      required:
        - otpCode
      properties:
        otpCode:
          type: string
          pattern: '^[0-9]{6}$'
    UserPayload:
      type: object
      required:
        - userName
        - email
        - roleCode
      properties:
        userName:
          type: string
        email:
          type: string
          format: email
        roleCode:
          type: string
        organizationId:
          type: integer
          nullable: true
        teamId:
          type: integer
          nullable: true
        status:
          $ref: '#/components/schemas/EnableStatus'
        password:
          type: string
        version:
          type: integer
          minimum: 1
        updatedAt:
          type: string
        updateTime:
          type: string
    AssignUserRoleRequestBody:
      type: object
      required:
        - roleCode
      properties:
        roleCode:
          type: string
        version:
          type: integer
          minimum: 1
        updatedAt:
          type: string
        updateTime:
          type: string
    TenantPayload:
      type: object
      required:
        - tenantCode
        - tenantName
      properties:
        tenantCode:
          type: string
        tenantName:
          type: string
        status:
          $ref: '#/components/schemas/EnableStatus'
        version:
          type: integer
          minimum: 1
        updatedAt:
          type: string
        updateTime:
          type: string
    PermissionPayload:
      type: object
      required:
        - permissionCode
        - permissionName
      properties:
        permissionCode:
          type: string
        permissionName:
          type: string
        group:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/EnableStatus'
        version:
          type: integer
          minimum: 1
        updatedAt:
          type: string
        updateTime:
          type: string
    RolePayload:
      type: object
      required:
        - roleCode
        - roleName
        - level
      properties:
        roleCode:
          type: string
        roleName:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/EnableStatus'
        level:
          type: integer
          minimum: 1
          maximum: 999
        permissionCodes:
          type: array
          items:
            type: string
        version:
          type: integer
          minimum: 1
        updatedAt:
          type: string
        updateTime:
          type: string
    RoleSyncPermissionsRequestBody:
      type: object
      required:
        - permissionCodes
      properties:
        permissionCodes:
          type: array
          items:
            type: string
        version:
          type: integer
          minimum: 1
        updatedAt:
          type: string
        updateTime:
          type: string
    OrganizationPayload:
      type: object
      required:
        - organizationCode
        - organizationName
      properties:
        organizationCode:
          type: string
        organizationName:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/EnableStatus'
        sort:
          type: integer
          minimum: 0
          maximum: 65535
        version:
          type: integer
          minimum: 1
        updatedAt:
          type: string
        updateTime:
          type: string
    TeamPayload:
      type: object
      required:
        - organizationId
        - teamCode
        - teamName
      properties:
        organizationId:
          type: integer
          minimum: 1
        teamCode:
          type: string
        teamName:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/EnableStatus'
        sort:
          type: integer
          minimum: 0
          maximum: 65535
        version:
          type: integer
          minimum: 1
        updatedAt:
          type: string
        updateTime:
          type: string
    LanguageTranslationPayload:
      type: object
      required:
        - locale
        - translationKey
        - translationValue
      properties:
        locale:
          type: string
        translationKey:
          type: string
        translationValue:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/EnableStatus'
        version:
          type: integer
          minimum: 1
        updatedAt:
          type: string
        updateTime:
          type: string
    ThemeConfigPayload:
      type: object
      properties:
        themeScheme:
          type: string
          enum: [light, dark, auto]
        themeColor:
          type: string
        themeRadius:
          type: integer
          minimum: 0
          maximum: 16
        headerHeight:
          type: integer
          minimum: 48
          maximum: 80
        siderWidth:
          type: integer
          minimum: 180
          maximum: 320
        siderCollapsedWidth:
          type: integer
          minimum: 48
          maximum: 120
        layoutMode:
          type: string
        scrollMode:
          type: string
        darkSider:
          type: boolean
        themeSchemaVisible:
          type: boolean
        headerFullscreenVisible:
          type: boolean
        tabVisible:
          type: boolean
        tabFullscreenVisible:
          type: boolean
        breadcrumbVisible:
          type: boolean
        footerVisible:
          type: boolean
        footerHeight:
          type: integer
          minimum: 32
          maximum: 96
        multilingualVisible:
          type: boolean
        globalSearchVisible:
          type: boolean
        themeConfigVisible:
          type: boolean
        pageAnimate:
          type: boolean
        pageAnimateMode:
          type: string
        fixedHeaderAndTab:
          type: boolean
