services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-obsidian_admin}
      MYSQL_USER: ${DB_USERNAME:-obsidian}
      MYSQL_PASSWORD: ${DB_PASSWORD:-obsidian}
    volumes:
      - mysql-octane-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-octane-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  octane:
    build:
      context: .
      target: app
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:${APP_HTTP_PORT:-8080}}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-obsidian_admin}
      DB_USERNAME: ${DB_USERNAME:-obsidian}
      DB_PASSWORD: ${DB_PASSWORD:-obsidian}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      OCTANE_SERVER: roadrunner
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8081
      REVERB_HOST: ${REVERB_HOST:-127.0.0.1}
      REVERB_PORT: ${REVERB_PORT:-8081}
    command:
      - sh
      - -lc
      - >-
          if [ ! -x ./rr ] || ! ./rr --version >/dev/null 2>&1; then
            php artisan octane:install --server=roadrunner --force --no-interaction;
          fi;
          exec php artisan octane:start --server=roadrunner --host=0.0.0.0 --port=8000 --rpc-host=0.0.0.0 --rpc-port=6002 --workers=auto --max-requests=500 --rr-config=.rr.yaml
    ports:
      - "${APP_HTTP_PORT:-8080}:8000"

  horizon:
    build:
      context: .
      target: app
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-obsidian_admin}
      DB_USERNAME: ${DB_USERNAME:-obsidian}
      DB_PASSWORD: ${DB_PASSWORD:-obsidian}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
    command: php artisan horizon

  scheduler:
    build:
      context: .
      target: app
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-obsidian_admin}
      DB_USERNAME: ${DB_USERNAME:-obsidian}
      DB_PASSWORD: ${DB_PASSWORD:-obsidian}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
    command: >-
      sh -lc 'while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done'

  pulse-worker:
    build:
      context: .
      target: app
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-obsidian_admin}
      DB_USERNAME: ${DB_USERNAME:-obsidian}
      DB_PASSWORD: ${DB_PASSWORD:-obsidian}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
    command: php artisan pulse:work

  reverb:
    build:
      context: .
      target: app
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-obsidian_admin}
      DB_USERNAME: ${DB_USERNAME:-obsidian}
      DB_PASSWORD: ${DB_PASSWORD:-obsidian}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8081
      REVERB_HOST: ${REVERB_HOST:-127.0.0.1}
      REVERB_PORT: ${REVERB_PORT:-8081}
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    ports:
      - "${REVERB_PUBLIC_PORT:-6001}:8081"

volumes:
  mysql-octane-data:
  redis-octane-data:
